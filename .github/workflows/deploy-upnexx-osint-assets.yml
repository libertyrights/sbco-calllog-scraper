name: deploy-upnexx-osint-assets

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Deploy assets
        env:
          SBCO_FTP_HOST: ${{ secrets.SERV00_FTP_HOST }}
          SBCO_FTP_USER: ${{ secrets.SERV00_FTP_USER }}
          SBCO_FTP_PASS: ${{ secrets.SERV00_FTP_PASS }}
        run: |
          python sync_calllog_descriptions.py
          python deploy_ftp_file.py site/index.html index.html
          python deploy_ftp_file.py site/status.html status.html
          python deploy_ftp_file.py site/downloads.html downloads.html
          python deploy_ftp_file.py site/arrests.html arrests.html
          python deploy_ftp_file.py site/crimes.html crimes.html
          python deploy_ftp_file.py site/ip.html ip.html
          python deploy_ftp_file.py site/phone.html phone.html
          python deploy_ftp_file.py site/earthquakes.html earthquakes.html
          python deploy_ftp_file.py site/property/index.html property/index.html
          python deploy_ftp_file.py site/upload_calllog_signed.php upload_calllog_signed.php
          python deploy_ftp_file.py site/calllog_upload_public.pem calllog_upload_public.pem
          python deploy_ftp_file.py site/sbsd.html sbsd.html
          python deploy_ftp_file.py site/records.html records.html
          python deploy_ftp_file.py site/calllog_descriptions.php calllog_descriptions.php
          python deploy_ftp_file.py site/calltypes.csv calltypes.csv
          python deploy_ftp_file.py site/dispos.csv dispos.csv
          python deploy_ftp_file.py site/callprefix.csv callprefix.csv
          python deploy_ftp_file.py site/calllog_descriptions.pdf.json calllog_descriptions.pdf.json
          python deploy_ftp_file.py site/calllog_descriptions.manual.json calllog_descriptions.manual.json
          python deploy_ftp_file.py site/record_lookup_request.php record_lookup_request.php
          if [ -f runtime/calllog_descriptions_deploy.env ]; then . runtime/calllog_descriptions_deploy.env; fi
          if [ "${CALLLOG_DESCRIPTIONS_UPLOAD:-0}" = "1" ] && [ -f site/calllog_descriptions.json ]; then
            python deploy_ftp_file.py site/calllog_descriptions.json calllog_descriptions.json
          else
            echo "Skipping calllog_descriptions.json live deploy (${CALLLOG_DESCRIPTIONS_REASON:-status-controlled})."
          fi

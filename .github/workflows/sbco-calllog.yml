name: sbco-calllog

on:
  workflow_dispatch:
  schedule:
    - cron: '7,27,47 * * * *'

concurrency:
  group: sbco-calllog-publish
  cancel-in-progress: false

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare runtime directory
        run: mkdir -p "$GITHUB_WORKSPACE/runtime"

      - name: Deploy public osint assets
        env:
          SBCO_FTP_HOST: ${{ secrets.SERV00_FTP_HOST }}
          SBCO_FTP_USER: ${{ secrets.SERV00_FTP_USER }}
          SBCO_FTP_PASS: ${{ secrets.SERV00_FTP_PASS }}
        run: |
          python sync_calllog_descriptions.py
          python deploy_ftp_file.py site/index.html index.html
          python deploy_ftp_file.py site/status.html status.html
          python deploy_ftp_file.py site/downloads.html downloads.html
          python deploy_ftp_file.py site/arrests.html arrests.html
          python deploy_ftp_file.py site/crimes.html crimes.html
          python deploy_ftp_file.py site/ip.html ip.html
          python deploy_ftp_file.py site/phone.html phone.html
          python deploy_ftp_file.py site/earthquakes.html earthquakes.html
          python deploy_ftp_file.py site/property/index.html property/index.html
          python deploy_ftp_file.py site/upload_calllog_signed.php upload_calllog_signed.php
          python deploy_ftp_file.py site/calllog_upload_public.pem calllog_upload_public.pem
          python deploy_ftp_file.py site/sbsd.html sbsd.html
          python deploy_ftp_file.py site/records.html records.html
          python deploy_ftp_file.py site/calllog_descriptions.php calllog_descriptions.php
          python deploy_ftp_file.py site/calltypes.csv calltypes.csv
          python deploy_ftp_file.py site/dispos.csv dispos.csv
          python deploy_ftp_file.py site/callprefix.csv callprefix.csv
          python deploy_ftp_file.py site/calllog_descriptions.pdf.json calllog_descriptions.pdf.json
          python deploy_ftp_file.py site/calllog_descriptions.manual.json calllog_descriptions.manual.json
          python deploy_ftp_file.py site/record_lookup_request.php record_lookup_request.php
          if [ -f runtime/calllog_descriptions_deploy.env ]; then . runtime/calllog_descriptions_deploy.env; fi
          if [ "${CALLLOG_DESCRIPTIONS_UPLOAD:-0}" = "1" ] && [ -f site/calllog_descriptions.json ]; then
            python deploy_ftp_file.py site/calllog_descriptions.json calllog_descriptions.json
          else
            echo "Skipping calllog_descriptions.json live deploy (${CALLLOG_DESCRIPTIONS_REASON:-status-controlled})."
          fi
          python deploy_ftp_file.py site/trigger_github.php trigger_github.php

      - name: Run scraper and publish
        env:
          SBCO_BASE_DIR: ${{ github.workspace }}/runtime
          SBCO_SERVER_CALLLOG_URL: ${{ secrets.SBCO_SERVER_CALLLOG_URL }}
          SBCO_HTTP_UPLOAD_URL: https://upnexx.xyz/osint/upload_calllog_signed.php
          SBCO_UPLOAD_SIGNING_PRIVATE_KEY: ${{ secrets.SBCO_UPLOAD_SIGNING_PRIVATE_KEY }}
          SBCO_REMOTE_DB_REBUILD_TOKEN: ${{ secrets.SBCO_REMOTE_DB_REBUILD_TOKEN }}
          SBCO_FTP_HOST: ${{ secrets.SERV00_FTP_HOST }}
          SBCO_FTP_USER: ${{ secrets.SERV00_FTP_USER }}
          SBCO_FTP_PASS: ${{ secrets.SERV00_FTP_PASS }}
          SBCO_HTTP_UPLOAD_SOURCE: github-actions
          SBCO_RUNNER_ID: github-${{ github.run_id }}-${{ github.run_attempt }}
          SBCO_REMOTE_BACKED_DAILY_FILES: '1'
          SBCO_ENABLE_DAILY_RELEASES: '0'
          SBCO_RUN_HARD_TIMEOUT_SECONDS: '840'
          SBCO_DEATH_INDEX_REFRESH_TIMEOUT_SECONDS: '480'
          SBCO_ARREST_LOG_REFRESH_TIMEOUT_SECONDS: '420'
          SBCO_GITHUB_JOB_SOFT_TIMEOUT_SECONDS: '780'
          SBCO_GITHUB_DAILY_REFRESH_HEADROOM_SECONDS: '90'
          SBCO_ARREST_LOG_REQUEST_DELAY_SECONDS: '2.0'
          SBCO_ARREST_LOG_MAX_PAGES: '3'
        run: python scraper_run.py

      - name: Upload status to serv00 dashboard
        if: always()
        env:
          SERV00_FTP_HOST: ${{ secrets.SERV00_FTP_HOST }}
          SERV00_FTP_USER: ${{ secrets.SERV00_FTP_USER }}
          SERV00_FTP_PASS: ${{ secrets.SERV00_FTP_PASS }}
          SBCO_BASE_DIR: ${{ github.workspace }}/runtime
        run: python upload_calllog_status.py

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbco-calllog-runtime-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ${{ github.workspace }}/runtime/*.log
            ${{ github.workspace }}/runtime/*.json
            ${{ github.workspace }}/runtime/*.csv

name: sbco-calllog

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

concurrency:
  group: sbco-calllog-publish
  cancel-in-progress: false

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare runtime directory
        run: mkdir -p "$GITHUB_WORKSPACE/runtime"

      - name: Run scraper and publish
        env:
          SBCO_BASE_DIR: ${{ github.workspace }}/runtime
          SBCO_SERVER_CALLLOG_URL: ${{ secrets.SBCO_SERVER_CALLLOG_URL }}
          SBCO_HTTP_UPLOAD_URL: ${{ secrets.SBCO_HTTP_UPLOAD_URL }}
          SBCO_HTTP_UPLOAD_SECRET: ${{ secrets.SBCO_HTTP_UPLOAD_SECRET }}
          SBCO_HTTP_UPLOAD_SOURCE: github-actions
          SBCO_RUNNER_ID: github-${{ github.run_id }}-${{ github.run_attempt }}
          SBCO_REMOTE_BACKED_DAILY_FILES: '1'
          SBCO_ENABLE_DAILY_RELEASES: '0'
          SBCO_DEATH_INDEX_REFRESH_TIMEOUT_SECONDS: '480'
          SBCO_ARREST_LOG_REFRESH_TIMEOUT_SECONDS: '420'
          SBCO_GITHUB_JOB_SOFT_TIMEOUT_SECONDS: '1200'
          SBCO_GITHUB_DAILY_REFRESH_HEADROOM_SECONDS: '300'
          SBCO_ARREST_LOG_REQUEST_DELAY_SECONDS: '2.0'
          SBCO_ARREST_LOG_MAX_PAGES: '3'
        run: python scraper_run.py

      - name: Upload status to serv00 dashboard
        if: always()
        env:
          SERV00_FTP_HOST: ${{ secrets.SERV00_FTP_HOST }}
          SERV00_FTP_USER: ${{ secrets.SERV00_FTP_USER }}
          SERV00_FTP_PASS: ${{ secrets.SERV00_FTP_PASS }}
          SBCO_BASE_DIR: ${{ github.workspace }}/runtime
        run: python upload_calllog_status.py

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbco-calllog-runtime-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ${{ github.workspace }}/runtime/*.log
            ${{ github.workspace }}/runtime/*.json
            ${{ github.workspace }}/runtime/*.csv

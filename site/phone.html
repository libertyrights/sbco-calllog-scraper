<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reverse Phone Lookup</title>
<style>
:root{--ink:#1f2623;--muted:#5f6d66;--paper:#fffaf0;--bg:#efe4cf;--line:#d7c6a9;--accent:#245c99}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:linear-gradient(145deg,#f7f0e2,#d7c6a9);color:var(--ink);font-family:Georgia,"Times New Roman",serif}
.shell{width:min(980px,calc(100% - 28px));margin:0 auto;padding:28px 0}
.hero,.card{border:1px solid rgba(255,255,255,.75);border-radius:24px;background:rgba(255,250,240,.82);box-shadow:0 18px 48px rgba(74,65,52,.12)}
.hero{padding:28px;background:linear-gradient(135deg,#1f2623,#3e4a42);color:#fffaf0}
h1{margin:0;font-size:clamp(2rem,5vw,4rem);letter-spacing:-.05em;line-height:.95}
.hero p{max-width:680px;color:rgba(255,250,240,.8)}
.card{margin-top:16px;padding:18px}
label{display:block;font:700 .78rem Verdana,sans-serif;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.lookup{display:grid;grid-template-columns:1fr auto;gap:10px}
input{min-height:46px;border:1px solid var(--line);border-radius:12px;padding:0 14px;font-size:18px}
button,.button{min-height:46px;border:0;border-radius:12px;background:#163c69;color:#fff;padding:0 16px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
button.secondary,.button.secondary{background:#53625b}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px}
.field{border:1px solid var(--line);border-radius:16px;padding:14px;background:rgba(255,255,255,.45)}
.field b{display:block;font:700 .72rem Verdana,sans-serif;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.links{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.warn{color:#8a4a13;font-weight:700}
.muted{color:var(--muted)}
@media(max-width:640px){.lookup,.grid{grid-template-columns:1fr}}
</style>
<!-- Analytics: Clicky + Statcounter -->
<script async data-id="101508838" src="//static.getclicky.com/js"></script>
<!-- Default Statcounter code for Upnexx Technologies
https://upnexx.xyz -->
<script type="text/javascript">

async></script>

</head>
<body>
<main class="shell">
  <section class="hero">
    <h1>Reverse phone lookup</h1>
    <p>Normalize a phone number, identify basic NANP metadata, and launch focused OSINT searches. This page does not use the broken legacy phone.php backend.</p>
  </section>

  <section class="card">
    <label for="phone">Phone number</label>
    <form class="lookup" id="lookupForm">
      <input id="phone" name="phone" autocomplete="tel" placeholder="760-555-1212">
      <button type="submit">Lookup</button>
    </form>
    <p id="message" class="muted">Enter a US/Canada number. External links open in a new tab.</p>
  </section>

  <section class="card" id="results" hidden>
    <div class="grid" id="fields"></div>
    <div class="links" id="links"></div>
  </section>
</main>

<script>
const AREA_CODES = {
  "442":"760 overlay: Inland Empire desert, High Desert, Coachella Valley, Imperial County",
  "760":"San Bernardino desert / High Desert / eastern California",
  "909":"San Bernardino Valley / Inland Empire",
  "951":"Riverside County / Inland Empire",
  "661":"Kern, Antelope Valley, northern Los Angeles County",
  "626":"San Gabriel Valley",
  "818":"San Fernando Valley",
  "747":"San Fernando Valley overlay",
  "213":"Los Angeles",
  "323":"Los Angeles",
  "310":"West Los Angeles / South Bay",
  "424":"West Los Angeles / South Bay overlay",
  "714":"Orange County",
  "657":"Orange County overlay",
  "619":"San Diego",
  "858":"San Diego",
  "949":"South Orange County",
};

function digitsOnly(value){return String(value || "").replace(/\D/g,"")}
function normalizePhone(value){
  let digits = digitsOnly(value);
  if (digits.length === 11 && digits.startsWith("1")) digits = digits.slice(1);
  return digits;
}
function formatNanp(digits){return `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`}
function field(label,value){return `<div class="field"><b>${label}</b>${value || "<span class='muted'>Unknown</span>"}</div>`}
function link(label,url,secondary=false){return `<a class="button ${secondary ? "secondary" : ""}" href="${url}" target="_blank" rel="noreferrer">${label}</a>`}

function runLookup(raw){
  const digits = normalizePhone(raw);
  const message = document.getElementById("message");
  if (digits.length !== 10) {
    document.getElementById("results").hidden = true;
    message.innerHTML = "<span class='warn'>Enter a 10 digit NANP phone number.</span>";
    return;
  }
  const area = digits.slice(0,3);
  const prefix = digits.slice(3,6);
  const line = digits.slice(6);
  const national = formatNanp(digits);
  const e164 = `+1${digits}`;
  const quoted = encodeURIComponent(`"${national}" OR "${digits}" OR "${e164}"`);
  const plain = encodeURIComponent(digits);
  document.getElementById("fields").innerHTML = [
    field("National format", national),
    field("E.164", e164),
    field("Area code", `${area} - ${AREA_CODES[area] || "not in local map"}`),
    field("Central office prefix", prefix),
    field("Line number", line),
    field("Notes", "Carrier/name requires an external lookup source or API key. Caller ID can be spoofed."),
  ].join("");
  document.getElementById("links").innerHTML = [
    link("Google exact search", `https://www.google.com/search?q=${quoted}`),
    link("DuckDuckGo exact search", `https://duckduckgo.com/?q=${quoted}`),
    link("FreeCarrierLookup", `https://freecarrierlookup.com/?cc=US&phonenum=${plain}`),
    link("IPQS carrier lookup", `https://www.ipqualityscore.com/free-carrier-lookup/lookup/US/${plain}`, true),
    link("Truecaller search", `https://www.truecaller.com/search/us/${plain}`, true),
  ].join("");
  message.textContent = `Lookup prepared for ${national}.`;
  document.getElementById("results").hidden = false;
}

document.getElementById("lookupForm").addEventListener("submit", (event) => {
  event.preventDefault();
  runLookup(document.getElementById("phone").value);
});
</script>
</body>
</html>
